name: iOS CI - TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install dependencies (CocoaPods)
        run: |
          cd ios_app
          if [ -f "Podfile" ]; then
            pod install --repo-update
          fi

      - name: Build iOS App
        run: |
          cd ios_app
          bundle install
          bundle exec fastlane ios beta

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FundMind-IPA
          path: ios_app/build/FundMind.ipa
